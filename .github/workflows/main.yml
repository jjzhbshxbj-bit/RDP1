name: RDP

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: ubuntu-latest
    timeout-minutes: 3600

    steps:
      - name: Install desktop and xrdp
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            xrdp xfce4 xfce4-goodies dbus-x11 x11-xserver-utils netcat-openbsd

          # Configure xrdp to use XFCE
          echo "startxfce4" | sudo tee /etc/xrdp/startwm.sh
          sudo chmod +x /etc/xrdp/startwm.sh

          # Fix D-Bus configuration
          sudo sed -i 's/^.*policykit=.*/policykit=true/' /etc/xrdp/xrdp.ini
          sudo sed -i 's/^.*new_cursors=.*/new_cursors=true/' /etc/xrdp/xrdp.ini

          # Enable D-Bus for XRDP sessions
          sudo systemctl enable dbus
          sudo systemctl start dbus

          sudo systemctl enable xrdp
          sudo systemctl restart xrdp

      - name: Create RDP user with secure password
        run: |
          password=$(python3 - << 'EOF'
import secrets
import string

alphabet = string.ascii_letters + string.digits + "!@#$%^&*()_+{}[]:;,.<>?"
print(''.join(secrets.choice(alphabet) for _ in range(20)))
EOF
)

          sudo useradd -m -s /bin/bash rdp
          echo "rdp:$password" | sudo chpasswd
          sudo usermod -aG sudo rdp

          # Configure XFCE session for RDP user
          sudo -u rdp mkdir -p /home/rdp/.config
          echo "startxfce4" | sudo -u rdp tee /home/rdp/.xsession
          sudo chown rdp:rdp /home/rdp/.xsession

          # Fix XDG_CONFIG_DIRS for RDP sessions
          sudo -u rdp bash -c 'echo "export XDG_CONFIG_DIRS=/etc/xdg" >> /home/rdp/.bashrc'
          sudo -u rdp bash -c 'echo "export XDG_CONFIG_DIRS=/etc/xdg" >> /home/rdp/.profile'

          # Create XFCE config directory
          sudo -u rdp mkdir -p /home/rdp/.config/xfce4
          sudo chown -R rdp:rdp /home/rdp/.config

          echo "RDP_CREDS=User: rdp | Password: $password" >> "$GITHUB_ENV"

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh

      - name: Establish Tailscale connection
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          sudo tailscale up --authkey="${TAILSCALE_AUTH_KEY}" --hostname="gh-runner-${GITHUB_RUN_ID}"

          ts_ip=""
          for i in {1..10}; do
            ts_ip=$(tailscale ip -4 | head -n 1 || true)
            if [ -n "$ts_ip" ]; then
              break
            fi
            sleep 5
          done

          if [ -z "$ts_ip" ]; then
            echo "Tailscale IP not assigned. Exiting."
            exit 1
          fi

          echo "TAILSCALE_IP=$ts_ip" >> "$GITHUB_ENV"

      - name: Verify RDP accessibility
        run: |
          echo "Tailscale IP: $TAILSCALE_IP"

          if ! nc -zv "$TAILSCALE_IP" 3389; then
            echo "TCP connection to RDP port 3389 failed"
            exit 1
          fi

          echo "TCP connectivity successful!"

      - name: Maintain connection
        run: |
          echo ""
          echo "=== RDP ACCESS ==="
          echo "Address: $TAILSCALE_IP"
          echo "Username: rdp"
          echo "Password: $RDP_CREDS"
          echo "=================="

          while true; do
            echo "[$(date)] RDP Active - Cancel the workflow to terminate"
            sleep 300
          done
